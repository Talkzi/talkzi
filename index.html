<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talkzi</title>
    <link rel="icon" type="image/png" href="/talkzi-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Apply persisted theme before React mounts to avoid a flash.
      try {
        const raw = localStorage.getItem('talkzi_theme');
        const t = raw ? (JSON.parse(raw)?.state?.theme || 'dark') : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch { document.documentElement.setAttribute('data-theme', 'dark'); }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
